name: Fork Release Builds

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag. Defaults to fork-v<package-version>-<run-number>."
        required: false
        type: string
      prerelease:
        description: "Publish as a GitHub prerelease."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.12.3"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-14
            artifact: macos-universal
          - name: Windows x64
            os: windows-2022
            artifact: windows-x64
          - name: Linux x64
            os: ubuntu-22.04
            artifact: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        shell: bash
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            elfutils \
            file \
            flatpak \
            flatpak-builder \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          input_tag="${{ github.event.inputs.release_tag || '' }}"
          if [ -n "$input_tag" ]; then
            release_tag="$input_tag"
          else
            release_tag="fork-v${package_version}-${GITHUB_RUN_NUMBER}"
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "Using release tag: $release_tag"

      - name: Write unsigned Tauri config
        shell: bash
        run: |
          cat > tauri.unsigned.conf.json <<'JSON'
          {"bundle":{"createUpdaterArtifacts":false}}
          JSON

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          pnpm tauri build \
            --target universal-apple-darwin \
            --config tauri.unsigned.conf.json \
            --ci

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm tauri build --bundles msi --config tauri.unsigned.conf.json --ci

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          pnpm tauri build \
            --bundles appimage,deb,rpm \
            --config tauri.unsigned.conf.json \
            --ci

      - name: Collect macOS assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          dmg_path=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f | head -1 || true)
          app_path=$(find src-tauri/target -path "*/bundle/macos/*.app" -type d | head -1 || true)

          if [ -z "$dmg_path" ]; then
            echo "No macOS DMG found under src-tauri/target" >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/CC-Switch-${RELEASE_TAG}-macOS-universal.dmg"

          if [ -n "$app_path" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$app_path" \
              "release-assets/CC-Switch-${RELEASE_TAG}-macOS-universal.zip"
          fi

      - name: Collect Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $bundleRoot = 'src-tauri/target/release/bundle'
          $msi = Get-ChildItem -Path $bundleRoot -Recurse -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            throw "No Windows MSI installer found under $bundleRoot"
          }
          Copy-Item $msi.FullName "release-assets/CC-Switch-$env:RELEASE_TAG-Windows-x64.msi"

          $portableExe = 'src-tauri/target/release/cc-switch.exe'
          if (Test-Path $portableExe) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $portableExe $portableDir
            Set-Content -Path (Join-Path $portableDir 'portable.ini') -Value @('portable=true') -Encoding UTF8
            Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/CC-Switch-$env:RELEASE_TAG-Windows-x64-Portable.zip" -Force
            Remove-Item -Recurse -Force $portableDir
          }

      - name: Collect Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          found=0

          appimage_path=$(find src-tauri/target -path "*/bundle/*" -name "*.AppImage" -type f | head -1 || true)
          deb_path=$(find src-tauri/target -path "*/bundle/*" -name "*.deb" -type f | head -1 || true)
          rpm_path=$(find src-tauri/target -path "*/bundle/*" -name "*.rpm" -type f | head -1 || true)

          if [ -n "$appimage_path" ]; then
            cp "$appimage_path" "release-assets/CC-Switch-${RELEASE_TAG}-Linux-x64.AppImage"
            found=1
          fi
          if [ -n "$deb_path" ]; then
            cp "$deb_path" "release-assets/CC-Switch-${RELEASE_TAG}-Linux-x64.deb"
            found=1
          fi
          if [ -n "$rpm_path" ]; then
            cp "$rpm_path" "release-assets/CC-Switch-${RELEASE_TAG}-Linux-x64.rpm"
            found=1
          fi

          if [ "$found" -ne 1 ]; then
            echo "No Linux installers found under src-tauri/target" >&2
            exit 1
          fi

      - name: List release assets
        shell: bash
        run: ls -la release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fork-release-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish fork prerelease
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          input_tag="${{ github.event.inputs.release_tag || '' }}"
          if [ -n "$input_tag" ]; then
            release_tag="$input_tag"
          else
            release_tag="fork-v${package_version}-${GITHUB_RUN_NUMBER}"
          fi

          prerelease="${{ github.event.inputs.prerelease || 'true' }}"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "PRERELEASE=$prerelease" >> "$GITHUB_ENV"
          echo "RELEASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${release_tag}" >> "$GITHUB_ENV"

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fork-release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets
          cat > release-notes.md <<EOF
          Public fork build from commit ${GITHUB_SHA}.

          This release is produced by the fork-only GitHub Actions workflow for testing and sharing downloadable installers.

          Available assets:
          - macOS universal: .dmg and .zip
          - Windows x64: .msi and portable .zip
          - Linux x64: AppImage, deb, and rpm when generated by Tauri

          Notes:
          - Updater artifacts are disabled for this fork build, so it does not require TAURI_SIGNING_PRIVATE_KEY.
          - macOS assets are unsigned and not notarized because this public fork does not have Apple Developer signing secrets.
          - Official signed releases should still be published by the upstream repository's release workflow.
          EOF

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [ "$PRERELEASE" != "false" ]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CC Switch $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "CC Switch $RELEASE_TAG" \
              --notes-file release-notes.md \
              "${prerelease_flag[@]}"
          fi

          echo "Release published: $RELEASE_URL"
